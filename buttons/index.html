<!DOCTYPE html>
<html>
<head>
    <title>Vue App</title>
    <script src="https://unpkg.com/vue"></script>
    <link rel="stylesheet" href="http://davidtkatz.com/public_css/vue.css">
</head>
<body>
  <div id="app">
    <button @click="reveal" class="vue-btn">show me the secret number</button>
    <br>
    <button v-on:click="increase" class="vue-btn">click the button</button>
    <p>You've clicked the button {{ counter }} times.</p>
  </div>
  <script>
    var app = new Vue({
      el: '#app',
      data: {
        secretNumber: Math.floor(Math.random() * 100) + 1,
        counter: 0
      },
      methods: {
        reveal() {
          alert(`the secret number is: ${this.secretNumber}`)
        },
        increase(e) {
          this.counter++;
        }
      }
    })
  </script>
</body>
</html>
