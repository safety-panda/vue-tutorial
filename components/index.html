<!DOCTYPE html>
<html>
<head>
    <title>Vue App</title>
    <script src="https://unpkg.com/vue"></script>
    <link rel="stylesheet" href="http://davidtkatz.com/public_css/vue.css">
</head>
<body>
  <div id="app">
    <counter v-bind:add-num="10"></counter>
  </div>
  <script>

    var counter = Vue.component('counter', {
      template: `
      <div>
        <div>count: {{ this.count }} times</div>
        <button class="vue-btn" @click="addCounter">add {{ this.addNum }}</button>
      </div>
      `,
      props: {
        addNum: {
          type: Number,
          default: 1
        }
      },
      data() {
        return {
          count: 0
        }
      },
      methods: {
        addCounter() {
          this.count += this.addNum
        }
      }
    })

    var app = new Vue({
      el: '#app',
      components: {
        counter
      }
    })
  </script>
</body>
</html>
